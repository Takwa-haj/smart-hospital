version: '3.9'

services:
  # ── Kafka (KRaft mode, no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: hospital-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Patient Microservice ──────────────────────────────────────────────────
  patient-service:
    build: ./microservices/patient-service
    container_name: patient-service
    ports:
      - "50051:50051"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Appointment Microservice ──────────────────────────────────────────────
  appointment-service:
    build: ./microservices/appointment-service
    container_name: appointment-service
    ports:
      - "50052:50052"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Notification Microservice ─────────────────────────────────────────────
  notification-service:
    build: ./microservices/notification-service
    container_name: notification-service
    ports:
      - "50053:50053"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PATIENT_SERVICE_URL: patient-service:50051
      APPOINTMENT_SERVICE_URL: appointment-service:50052
      NOTIFICATION_SERVICE_URL: notification-service:50053
    depends_on:
      - patient-service
      - appointment-service
      - notification-service

volumes:
  kafka-data:
